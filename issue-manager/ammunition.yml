string_tools:
  - title: "[tool] base64_encode"
    description: "Encodes a string to Base64"
    signature: "run(text: str) -> str"
    example: 'base64_encode "hello" -> "aGVsbG8="'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] base64_decode"
    description: "Decodes a Base64 string back to plain text"
    signature: "run(text: str) -> str"
    example: 'base64_decode "aGVsbG8=" -> "hello"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] count_vowels"
    description: "Counts the number of vowels in a string"
    signature: "run(text: str) -> str"
    example: 'count_vowels "hello world" -> "3"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] is_anagram"
    description: "Checks if two strings are anagrams of each other"
    signature: "run(text1: str, text2: str) -> str"
    example: 'is_anagram "listen" "silent" -> "True"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] title_case"
    description: "Converts a string to title case"
    signature: "run(text: str) -> str"
    example: 'title_case "hello world" -> "Hello World"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] camel_to_snake"
    description: "Converts camelCase to snake_case"
    signature: "run(text: str) -> str"
    example: 'camel_to_snake "helloWorld" -> "hello_world"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] snake_to_camel"
    description: "Converts snake_case to camelCase"
    signature: "run(text: str) -> str"
    example: 'snake_to_camel "hello_world" -> "helloWorld"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] strip_html"
    description: "Removes all HTML tags from a string"
    signature: "run(text: str) -> str"
    example: 'strip_html "<p>Hello <b>world</b></p>" -> "Hello world"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] caesar_cipher"
    description: "Encodes a string using a Caesar cipher shift"
    signature: "run(text: str, shift: str) -> str"
    example: 'caesar_cipher "hello" "3" -> "khoor"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] levenshtein_distance"
    description: "Calculates the edit distance between two strings"
    signature: "run(text1: str, text2: str) -> str"
    example: 'levenshtein_distance "kitten" "sitting" -> "3"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

  - title: "[tool] word_frequency"
    description: "Returns each word and how many times it appears in a string"
    signature: "run(text: str) -> str"
    example: 'word_frequency "the cat sat on the mat" -> "the: 2, cat: 1, sat: 1, on: 1, mat: 1"'
    labels:
      - good first issue
      - help wanted
      - tool request
    fired: false

